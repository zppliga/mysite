<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка Лига ЗПП</title>
  
  <!-- Подключаем Netlify Identity для авторизации -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <!-- Подключаем Netlify CMS -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  
  <style>
    /* Стили для страницы загрузки */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .loading {
      text-align: center;
      padding: 20px;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Сообщение о загрузке -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Загрузка админ-панели...</p>
  </div>

  <script>
    // Показываем загрузку
    document.getElementById('loading').style.display = 'block';
    
    // Инициализация Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          // Если пользователь не авторизован, показываем форму входа
          window.netlifyIdentity.on("login", function() {
            // После входа перезагружаем страницу
            document.location.href = "/admin/";
          });
        } else {
          // Пользователь авторизован - скрываем загрузку
          document.getElementById('loading').style.display = 'none';
        }
      });
      
      // Инициализируем Identity
      window.netlifyIdentity.init();
    }
    
    // Если что-то пошло не так
    setTimeout(function() {
      document.getElementById('loading').innerHTML = 
        '<p style="color: #e74c3c;">Ошибка загрузки. Проверьте подключение или обновите страницу.</p>';
    }, 10000);
  </script>
</body>
</html>
